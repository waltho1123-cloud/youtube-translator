<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>YouTube 英中影片翻譯器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0f172a; }
        .glass {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.15);
        }
        .progress-bar {
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .step-active { border-color: #6366f1; color: #a5b4fc; }
        .step-done { border-color: #22c55e; color: #86efac; background: rgba(34,197,94,0.1); }
        .step-waiting { border-color: #334155; color: #64748b; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            background: #6366f1; border-radius: 50%; cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px; height: 24px;
            background: #6366f1; border-radius: 50%; cursor: pointer; border: none;
        }
        input[type="range"] {
            -webkit-appearance: none; height: 6px; border-radius: 3px;
            background: #334155; outline: none;
        }
        .ck { -webkit-appearance: checkbox !important; appearance: checkbox !important;
              width: 22px !important; height: 22px !important; opacity: 1 !important;
              position: static !important; accent-color: #6366f1; cursor: pointer; }
        .tab-active { background: rgba(99,102,241,0.2); border-color: #6366f1; color: #a5b4fc; }
        .tab-inactive { border-color: #334155; color: #64748b; }
        .tab-inactive:hover { border-color: #475569; color: #94a3b8; }
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            overflow: hidden; border-radius: 0.75rem; background: #000;
        }
        .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; }
        @media (prefers-reduced-motion: reduce) {
            .progress-bar { animation: none; }
            .fade-in { animation: none; }
        }
        .subtitle-overlay {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center; pointer-events: none; max-width: 94%;
        }
        .subtitle-zh {
            font-size: clamp(0.75rem, 2.5vw, 1.1rem); font-weight: 600; color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
            background: rgba(0,0,0,0.55); padding: 6px 16px; border-radius: 8px;
            display: inline-block; line-height: 1.5;
        }
        .subtitle-en {
            font-size: clamp(0.65rem, 2vw, 0.95rem); color: #d1d5db;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8); margin-top: 2px;
        }
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 50; align-items: center; justify-content: center;
        }
        .modal-backdrop.active { display: flex; }
        .modal-backdrop:not(.active) { display: none; }
        .modal-box {
            background: #1e293b; border: 1px solid rgba(99,102,241,0.3);
            border-radius: 1rem; padding: 1.5rem; width: 90%; max-width: 28rem;
            max-height: 90vh; overflow-y: auto;
        }
    </style>
</head>
<body class="min-h-screen text-gray-200 flex items-start justify-center p-3 pt-6 sm:p-4 sm:pt-12">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>

<script>
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
var player = null, ytReady = false;
function onYouTubeIframeAPIReady() { ytReady = true; }
</script>

<script>
(function() {
// ── Auth State ──
let isLoggedIn = false;
let loggedInUsername = '';
let loggedInAvatar = '';

function checkAuth() {
    fetch('/api/auth/me').then(r => r.json()).then(data => {
        isLoggedIn = data.logged_in;
        loggedInUsername = data.username || '';
        loggedInAvatar = data.avatar || '';
        updateAuthUI();
    }).catch(() => {});
}

function updateAuthUI() {
    var loginBtn = document.getElementById('googleLoginBtn');
    var userInfoEl = document.getElementById('userInfo');
    var avatarEl = document.getElementById('userAvatar');
    var nameEl = document.getElementById('userName');
    if (isLoggedIn) {
        loginBtn.classList.add('hidden');
        loginBtn.style.display = 'none';
        userInfoEl.classList.remove('hidden');
        userInfoEl.style.display = 'flex';
        nameEl.textContent = loggedInUsername;
        if (loggedInAvatar) {
            avatarEl.src = loggedInAvatar;
            avatarEl.classList.remove('hidden');
        } else {
            avatarEl.classList.add('hidden');
        }
    } else {
        loginBtn.classList.remove('hidden');
        loginBtn.style.display = 'block';
        userInfoEl.classList.add('hidden');
        userInfoEl.style.display = 'none';
        // 重新渲染 Google 按鈕（如果容器為空）
        if (loginBtn.children.length === 0) { initGoogleLogin(); }
    }
}

function initGoogleLogin() {
    fetch('/api/auth/google-client-id').then(function(r) { return r.json(); }).then(function(data) {
        if (!data.client_id) return;
        google.accounts.id.initialize({
            client_id: data.client_id,
            callback: handleGoogleResponse,
        });
        google.accounts.id.renderButton(
            document.getElementById('googleLoginBtn'),
            { theme: 'outline', size: 'medium', text: 'signin', locale: 'zh-TW' }
        );
    });
}

function googleLogin() {

// ── State ──
let currentMode = 'live';
let currentVideoId = null;
let translatedSegments = [];
let syncTimer = null;
let currentTtsAudio = null;
let currentTtsIndex = -1;
let bgAudio = null;  // Background music/sfx accompaniment track
let currentStep = null;
let eventSource = null;
let audioCtx = null;  // AudioContext for unlocking autoplay

const LIVE_STEPS = ['download', 'transcribe', 'translate', 'tts'];
let FULL_STEPS = ['download', 'transcribe', 'translate', 'tts', 'compose'];

const STEP_LABELS = {
    download: '下載音訊', separate: '音源分離', transcribe: '語音辨識', translate: '翻譯',
    tts: '語音合成', compose: '合成影片',
};
const STEP_MESSAGES = {
    download: '下載音訊中...', separate: '音源分離中 (Demucs)...',
    transcribe: '語音辨識中 (Whisper)...', translate: '翻譯中 (GPT)...',
    tts: '語音合成中 (ElevenLabs)...', compose: '合成影片中...',
};

// ── Unlock audio on first user interaction ──
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'running') {
        document.removeEventListener('click', unlockAudio);
        return;
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    // Also create + play a silent buffer to fully unlock Audio elements
    const silence = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = silence;
    src.connect(audioCtx.destination);
    src.start();
}
// 每次點擊都嘗試解鎖音訊（不限一次），確保長時間等待後仍可播放
document.addEventListener('click', unlockAudio);
window.addEventListener('beforeunload', () => {
    if (eventSource) { eventSource.close(); eventSource = null; }
    stopSync(); stopCurrentTts();
    if (bgAudio) { bgAudio.pause(); bgAudio = null; }
});

// ── URL → Auto Embed ──
const urlInput = document.getElementById('urlInput');
urlInput.addEventListener('input', debounceEmbed);
urlInput.addEventListener('paste', () => setTimeout(debounceEmbed, 100));

let urlTimer = null;
function debounceEmbed() {
    clearTimeout(urlTimer);
    urlTimer = setTimeout(() => {
        const vid = extractVideoId(urlInput.value.trim());
        if (vid && vid !== currentVideoId) embedVideo(vid);
    }, 400);
}

function extractVideoId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
}

function embedVideo(videoId) {
    currentVideoId = videoId;
    translatedSegments = [];
    stopSync();

    document.getElementById('playerSection').classList.remove('hidden');
    document.getElementById('controlSection').classList.remove('hidden');

    // IMPORTANT: player.destroy() removes the div from DOM — must recreate it
    if (player) {
        player.destroy();
        player = null;
    }
    // Always ensure the target div exists
    let targetDiv = document.getElementById('ytPlayer');
    if (!targetDiv) {
        targetDiv = document.createElement('div');
        targetDiv.id = 'ytPlayer';
        const wrapper = document.querySelector('.video-wrapper');
        wrapper.insertBefore(targetDiv, document.getElementById('subtitleOverlay'));
    }

    function create() {
        player = new YT.Player('ytPlayer', {
            videoId: videoId,
            playerVars: { autoplay: 0, cc_load_policy: 0, modestbranding: 1, rel: 0 },
        });
    }

    if (ytReady) create();
    else {
        let attempts = 0;
        const c = setInterval(() => {
            if (ytReady) { clearInterval(c); create(); }
            else if (++attempts > 50) { clearInterval(c); }
        }, 200);
    }
}

function findSegmentIndex(segments, time) {
    let lo = 0, hi = segments.length - 1;
    while (lo <= hi) {
        const mid = (lo + hi) >>> 1;
        if (time < segments[mid].start) hi = mid - 1;
        else if (time > segments[mid].end) lo = mid + 1;
        else return mid;
    }
    return -1;
}

// ── TTS + Subtitle Sync (polling-based, no event dependency) ──
function startSync() {
    stopSync();

    // Cache DOM references outside the interval callback
    const cachedLiveVolSlider = document.getElementById('liveVolSlider');
    const cachedLiveSubtitleToggle = document.getElementById('liveSubtitleToggle');
    const cachedLiveEnSubtitleToggle = document.getElementById('liveEnSubtitleToggle');
    const cachedSubtitleOverlay = document.getElementById('subtitleOverlay');
    const cachedSubtitleZh = document.getElementById('subtitleZh');
    const cachedSubtitleEn = document.getElementById('subtitleEn');

    syncTimer = setInterval(() => {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        if (translatedSegments.length === 0) return;

        // Check player state via polling (don't rely on events)
        let state;
        try { state = player.getPlayerState(); } catch(e) { return; }

        const liveVol = parseInt(cachedLiveVolSlider.value);
        const showZh = cachedLiveSubtitleToggle.checked;
        const showEn = cachedLiveEnSubtitleToggle.checked;

        if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) {
            if (currentTtsAudio) currentTtsAudio.pause();
            if (bgAudio && !bgAudio.paused) bgAudio.pause();
            return;
        }
        if (state !== YT.PlayerState.PLAYING) return;

        // Sync background music with video
        if (bgAudio) {
            try { player.setVolume(0); } catch(e) {}  // Mute original (has vocals)
            if (bgAudio.paused) {
                bgAudio.currentTime = player.getCurrentTime();
                bgAudio.play().catch(() => {});
            } else if (Math.abs(bgAudio.currentTime - player.getCurrentTime()) > 0.5) {
                bgAudio.currentTime = player.getCurrentTime();
            }
        }

        const t = player.getCurrentTime();
        const idx = findSegmentIndex(translatedSegments, t);

        if (idx >= 0 && idx !== currentTtsIndex) {
            // New segment
            stopCurrentTts();
            const seg = translatedSegments[idx];

            // Play TTS audio
            if (seg._audio) {
                seg._audio.currentTime = 0;
                seg._audio.play().catch(err => console.warn('TTS play blocked:', err));
                currentTtsAudio = seg._audio;
                currentTtsIndex = idx;
            }
            // Lower original volume (skip if using accompaniment — already muted)
            if (!bgAudio) { try { player.setVolume(liveVol); } catch(e) {} }

            // Subtitle overlay
            if (showZh || showEn) {
                cachedSubtitleZh.textContent = showZh ? seg.zh : '';
                cachedSubtitleZh.style.display = showZh ? 'inline-block' : 'none';
                cachedSubtitleEn.textContent = showEn ? seg.en : '';
                cachedSubtitleEn.style.display = showEn ? 'block' : 'none';
                cachedSubtitleOverlay.style.display = 'block';
            } else {
                cachedSubtitleOverlay.style.display = 'none';
            }
        } else if (idx < 0 && currentTtsIndex >= 0) {
            // Between segments
            stopCurrentTts();
            if (!bgAudio) { try { player.setVolume(100); } catch(e) {} }
            cachedSubtitleOverlay.style.display = 'none';
        }
    }, 250);
}

function stopSync() {
    if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
}

function stopCurrentTts() {
    if (currentTtsAudio) {
        currentTtsAudio.pause();
        currentTtsAudio.currentTime = 0;
        currentTtsAudio = null;
    }
    currentTtsIndex = -1;
}

function preloadAudio(segments) {
    segments.forEach(seg => {
        if (seg.audio) {
            const a = new Audio(seg.audio);
            a.preload = 'metadata';
            seg._audio = a;
        }
    });
}

// ── Steps / Progress / Log ──
function renderSteps(steps) {
    const c = document.getElementById('stepsContainer');
    c.innerHTML = '';
    steps.forEach(s => {
        const d = document.createElement('div');
        d.id = 'step-' + s;
        d.className = 'step-waiting flex-1 text-center py-2 border rounded-lg min-w-[3.5rem] whitespace-nowrap';
        d.textContent = STEP_LABELS[s] || s;
        c.appendChild(d);
    });
}

function addLog(msg, type = 'info') {
    const log = document.getElementById('logSection');
    const el = document.createElement('div');
    el.className = type === 'success' ? 'text-green-400' : type === 'error' ? 'text-red-400' : 'text-gray-400';
    el.textContent = `[${new Date().toLocaleTimeString('zh-TW',{hour12:false})}] ${msg}`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
}

function setStep(step, steps) {
    if (step === currentStep) return;
    const idx = steps.indexOf(step);
    steps.forEach((s, i) => {
        const el = document.getElementById('step-' + s);
        if (!el) return;
        if (i < idx) el.className = 'step-done flex-1 text-center py-2 border rounded-lg min-w-[3.5rem] whitespace-nowrap';
        else if (i === idx) el.className = 'step-active flex-1 text-center py-2 border rounded-lg min-w-[3.5rem] whitespace-nowrap';
        else el.className = 'step-waiting flex-1 text-center py-2 border rounded-lg min-w-[3.5rem] whitespace-nowrap';
    });
    if (STEP_MESSAGES[step] && step !== currentStep) addLog(STEP_MESSAGES[step]);
    currentStep = step;
}

function updateProgress(pct, msg) {
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    if (msg) document.getElementById('progressMsg').textContent = msg;
}

function showPreview(data) {
    document.getElementById('previewSection').classList.remove('hidden');
    const t = document.getElementById('previewTable');
    t.innerHTML = '';
    data.forEach(item => {
        const r = document.createElement('div');
        r.className = 'py-1.5 border-b border-slate-700/50';
        r.innerHTML = `<div class="flex gap-2 items-baseline">
    <span class="text-gray-500 flex-shrink-0 text-xs">${escapeHtml(fmt(item.start))}</span>
    <span class="text-gray-400 text-sm truncate">${escapeHtml(item.en)}</span>
</div>
<div class="text-indigo-300 text-sm truncate pl-10">${escapeHtml(item.zh)}</div>`;
        t.appendChild(r);
    });
}
function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]
    );
}

// ── Start Translation ──
async function startTranslation() {
    const url = urlInput.value.trim();
    if (!url) { urlInput.focus(); return; }

    // Unlock audio on this user gesture (click)
    unlockAudio();

    let steps;
    if (currentMode === 'live') {
        const liveKeepBg = document.getElementById('liveKeepBgToggle').checked;
        steps = liveKeepBg
            ? ['download', 'separate', 'transcribe', 'translate', 'tts']
            : LIVE_STEPS;
    } else {
        const keepBg = document.getElementById('keepBgToggle').checked;
        steps = keepBg
            ? ['download', 'separate', 'transcribe', 'translate', 'tts', 'compose']
            : FULL_STEPS;
    }

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg class="animate-spin w-5 h-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> <span>處理中...</span>';
    btn.classList.replace('bg-indigo-600', 'bg-slate-600');

    ['progressSection','resultSection','liveResultSection','errorSection'].forEach(id =>
        document.getElementById(id).classList.add('hidden'));
    document.getElementById('progressSection').classList.remove('hidden');
    document.getElementById('logSection').innerHTML = '';
    document.getElementById('previewSection').classList.add('hidden');
    currentStep = null;
    renderSteps(steps);

    try {
        let body, endpoint;
        if (currentMode === 'live') {
            endpoint = '/api/live-translate';
            body = { url, voice: document.getElementById('liveVoiceSelect').value,
                     keep_bg: document.getElementById('liveKeepBgToggle').checked };
        } else {
            endpoint = '/api/translate';
            body = {
                url,
                voice: document.getElementById('voiceSelect').value,
                volume: parseInt(document.getElementById('volumeSlider').value) / 100,
                subtitle: document.getElementById('subtitleToggle').checked,
                eng_subtitle: document.getElementById('engSubtitleToggle').checked,
                keep_bg: document.getElementById('keepBgToggle').checked,
                quality: document.getElementById('qualitySelect').value,
            };
        }

        const resp = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (!resp.ok || data.error) { showError(data.error || `伺服器錯誤 (${resp.status})`); return; }
        listenProgress(data.job_id, steps);
    } catch (e) {
        showError('Failed to start: ' + e.message);
    }
}

function listenProgress(jobId, steps) {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/progress/' + jobId);

    eventSource.onmessage = (e) => {
        let data;
        try { data = JSON.parse(e.data); } catch (err) { console.warn('SSE parse error:', err); return; }
        if (data.status === 'heartbeat') return;

        if (data.status === 'processing') {
            if (data.step) setStep(data.step, steps);
            updateProgress(data.progress, STEP_MESSAGES[data.step] || data.message);
            if (data.title) {
                const el = document.getElementById('videoTitle');
                el.textContent = data.title; el.classList.remove('hidden');
                addLog('影片: ' + data.title, 'success');
            }
            if (data.segment_count) addLog(`辨識出 ${data.segment_count} 個語句`, 'success');
            if (data.preview) showPreview(data.preview);
            if (data.total_segments) addLog(`翻譯完成: ${data.total_segments} 句`, 'success');
            if (data.tts_success !== undefined) addLog(`語音合成: ${data.tts_success}/${data.tts_total} 成功`, 'success');
        }

        if (data.status === 'completed') {
            eventSource.close();
            eventSource = null;
            updateProgress(100, '完成！');
            steps.forEach(s => {
                const el = document.getElementById('step-' + s);
                if (el) el.className = 'step-done flex-1 text-center py-2 border rounded-lg min-w-[3.5rem] whitespace-nowrap';
            });
            addLog('完成！', 'success');

            if (currentMode === 'live' && data.segments) {
                translatedSegments = data.segments;
                preloadAudio(translatedSegments);

                // Load accompaniment track if available
                if (data.accompaniment) {
                    bgAudio = new Audio(data.accompaniment);
                    bgAudio.preload = 'auto';
                    bgAudio.loop = false;
                }

                document.getElementById('progressSection').classList.add('hidden');
                document.getElementById('liveResultSection').classList.remove('hidden');
                const withAudio = translatedSegments.filter(s => s.audio).length;
                document.getElementById('liveSegmentCount').textContent =
                    `共 ${translatedSegments.length} 句翻譯，${withAudio} 段語音已就緒`;

                // 自動解鎖音訊並開始同步
                enableLiveAudio();
                startSync();
            } else {
                document.getElementById('progressSection').classList.add('hidden');
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('resultInfo').textContent = `檔案大小: ${data.size_mb} MB`;
                document.getElementById('downloadBtn').href = '/download/' + encodeURIComponent(data.filename);
            }
            resetButton();
        }

        if (data.status === 'error') {
            eventSource.close();
            eventSource = null;
            showError(data.message);
        }
    };
    eventSource.onerror = () => { eventSource.close(); eventSource = null; showError('Connection lost'); };
}

function showError(msg) {
    document.getElementById('progressSection').classList.add('hidden');
    document.getElementById('errorSection').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = msg;
    resetButton();
}

function resetButton() {
    const btn = document.getElementById('startBtn');
    btn.disabled = false;
    btn.classList.replace('bg-slate-600', 'bg-indigo-600');
    const icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
    const text = currentMode === 'live' ? '開始即時語音翻譯' : '開始完整翻譯下載';
    btn.innerHTML = `${icon} <span>${text}</span>`;
}

function resetForm() {
    ['progressSection','resultSection','liveResultSection','errorSection'].forEach(id =>
        document.getElementById(id).classList.add('hidden'));
    // Release all Audio objects to prevent memory leaks
    translatedSegments.forEach(seg => {
        if (seg._audio) { seg._audio.pause(); seg._audio.src = ''; seg._audio = null; }
    });
    translatedSegments = [];
    stopSync(); stopCurrentTts();
    if (bgAudio) { bgAudio.pause(); bgAudio = null; }
    document.getElementById('subtitleOverlay').style.display = 'none';
    currentStep = null;
}

async function saveKeys() {
    const openaiKey = document.getElementById('openaiKeyInput').value.trim();
    const minimaxKey = document.getElementById('minimaxKeyInput').value.trim();
    const minimaxGroup = document.getElementById('minimaxGroupInput').value.trim();
    const modal = document.getElementById('settingsModal');

    if (!openaiKey && !minimaxKey && !minimaxGroup) {
        modal.classList.remove('active');
        return;
    }

    const msgEl = document.getElementById('keySaveMsg');
    try {
        const resp = await fetch('/api/keys', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ openai_key: openaiKey, minimax_key: minimaxKey, minimax_group: minimaxGroup }),
        });
        if (resp.ok) {
            document.getElementById('openaiKeyInput').value = '';
            document.getElementById('minimaxKeyInput').value = '';
            document.getElementById('minimaxGroupInput').value = '';
            msgEl.textContent = '設定已儲存';
            msgEl.className = 'text-center text-sm text-green-400';
            msgEl.classList.remove('hidden');
            setTimeout(function() {
                msgEl.classList.add('hidden');
                modal.classList.remove('active');
            }, 1200);
            return;
        } else {
            var errData = null;
            try { errData = await resp.json(); } catch(e) {}
            var errMsg = (errData && errData.error) ? errData.error : '儲存失敗，請重試';
            msgEl.textContent = errMsg;
            msgEl.className = 'text-center text-sm text-red-400';
            msgEl.classList.remove('hidden');
            setTimeout(function() { msgEl.classList.add('hidden'); }, 3000);
            return;
        }
    } catch (e) {
        msgEl.textContent = '網路錯誤，請重試';
        msgEl.className = 'text-center text-sm text-red-400';
        msgEl.classList.remove('hidden');
        setTimeout(function() { msgEl.classList.add('hidden'); }, 3000);
        return;
    }
}

function enableLiveAudio() {
    // 使用者點擊解鎖音訊
    unlockAudio();

    // 預播放前 5 個有音訊的片段以解鎖（靜音播放一瞬間），避免同時解鎖過多
    var unlockCount = 0;
    for (var i = 0; i < translatedSegments.length && unlockCount < 5; i++) {
        var seg = translatedSegments[i];
        if (seg._audio) {
            (function(audio) {
                audio.volume = 0;
                audio.play().then(function() {
                    audio.pause();
                    audio.currentTime = 0;
                    audio.volume = 1;
                }).catch(function() {});
            })(seg._audio);
            unlockCount++;
        }
    }
    if (bgAudio) {
        bgAudio.volume = 0;
        bgAudio.play().then(function() {
            bgAudio.pause();
            bgAudio.currentTime = 0;
            bgAudio.volume = 1;
        }).catch(function() {});
    }

}

window.enableLiveAudio = enableLiveAudio;
function toggleKeyVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.querySelector('.eye-off').classList.toggle('hidden', isPassword);
    btn.querySelector('.eye-on').classList.toggle('hidden', !isPassword);
}

window.toggleSettings = toggleSettings;
window.saveKeys = saveKeys;
window.toggleKeyVisibility = toggleKeyVisibility;
window.googleLogin = googleLogin;
window.doLogout = doLogout;
})();
